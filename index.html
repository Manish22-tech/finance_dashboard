<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Finance Dashboard</h1>
</header>

<div class="container">
  <div class="sidebar">
    <h3>Menu</h3>
    <ul>
      <li>Dashboard</li>
      <li>Transactions</li>
      <li>Reports</li>
    </ul>
  </div>

  <div class="main">
    <div class="cards">
      <div class="card">
        <h3>Total Balance</h3>
        <p id="balance">₹0</p>
      </div>
      <div class="card">
        <h3>Income</h3>
        <p id="income">₹0</p>
      </div>
      <div class="card">
        <h3>Expenses</h3>
        <p id="expense">₹0</p>
      </div>
    </div>

    <h2>Add Transaction</h2>
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button onclick="addTransaction()">Add</button>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="tableData"></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
